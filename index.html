<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOJ アンケート</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-wrapper">
    <header class="site-header">
      <div class="header-logo">縁日</div>
      <h1 class="header-title">ア ン ケ ー ト</h1>
      <p class="header-sub">WOJ Survey</p>
      <span class="header-rule">━━━━━━━━━━━━━━━</span>
    </header>

    <main class="container">
      <!-- Survey Selection -->
      <div id="screen-select">
        <p class="section-title">回答するアンケートを選択</p>
        <div id="survey-list"></div>
        <div id="no-surveys" class="hidden"><div class="alert alert-info">現在公開中のアンケートはありません。</div></div>
      </div>

      <!-- Respondent Info -->
      <div id="screen-info" class="hidden">
        <button class="btn btn-secondary btn-sm mb-16" onclick="goToScreen('select')">← 一覧に戻る</button>
        <div class="card card-decorated">
          <div class="corner-inner">
            <h2 id="survey-title" class="section-title" style="margin-bottom:4px"></h2>
            <p id="survey-desc" class="text-mute" style="font-size:12px; margin-bottom:0"></p>
          </div>
        </div>
        <div class="divider">◇ ◇ ◇</div>
        <p class="section-title">回答者情報</p>
        <div class="respondent-info">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">お名前 <span class="required">必須</span></label>
            <input type="text" id="resp-name" class="form-input" placeholder="山田太郎">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">メールアドレス <span class="required">必須</span></label>
            <input type="email" id="resp-email" class="form-input" placeholder="example@mail.com">
          </div>
        </div>
        <div id="info-error" class="hidden"></div>
        <div class="mt-24 text-center">
          <button class="btn btn-primary btn-block" onclick="startStepper()">回 答 を 始 め る</button>
        </div>
      </div>

      <!-- Stepper (1 question at a time) -->
      <div id="screen-stepper" class="hidden">
        <div id="stepper-progress" class="stepper-progress"></div>
        <p id="stepper-count" class="stepper-count"></p>
        <div id="stepper-question"></div>
        <div id="stepper-error" class="hidden"></div>
        <div class="stepper-nav">
          <button id="btn-prev" class="btn btn-secondary btn-sm" onclick="stepperPrev()">← 戻る</button>
          <button id="btn-next" class="btn btn-primary btn-sm" onclick="stepperNext()">次へ →</button>
        </div>
      </div>

      <!-- Confirmation -->
      <div id="screen-confirm" class="hidden">
        <p class="section-title">回答内容の確認</p>
        <div class="card">
          <ul id="confirm-list" class="confirm-list"></ul>
        </div>
        <div id="submit-error" class="hidden"></div>
        <div class="stepper-nav mt-16">
          <button class="btn btn-secondary btn-sm" onclick="backToStepper()">← 修正する</button>
          <button id="btn-submit" class="btn btn-primary" onclick="submitSurvey()">送 信 す る</button>
        </div>
      </div>

      <!-- Completion -->
      <div id="screen-complete" class="hidden">
        <div class="completion">
          <div class="completion-icon">◆</div>
          <p class="completion-title">ご回答ありがとうございます</p>
          <p class="completion-text">アンケートの回答が送信されました。</p>
          <div class="mt-24">
            <button class="btn btn-secondary" onclick="goToScreen('select'); loadSurveys();">他のアンケートに回答する</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-logo">縁日</div>
      <p class="footer-text">Will of Japan</p>
      <p class="footer-mark">◆ ◇ ◆</p>
    </footer>
  </div>

  <div id="loading" class="loading-overlay"><span class="loading-text">読み込み中...</span></div>

  <script src="js/config.js"></script>
  <script src="js/survey.js"></script>
</body>
</html>
